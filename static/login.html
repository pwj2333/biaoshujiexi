<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>系统登录</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-stage">
      <section class="login-module">
        <div class="login-module__intro">
          <h1>标书解析</h1>
        </div>
        <section class="login-card login-card--standalone">
          <div class="login-card__head">
            <h2>登录</h2>
          </div>
          <label class="field">
            <span>用户名</span>
            <input id="loginUsername" value="ruico" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="loginPassword" type="password" placeholder="请输入密码" />
          </label>
          <button id="loginBtn" class="primary login-submit">登录并进入系统</button>
        </section>
      </section>
    </main>
    <div id="toast" class="toast hidden"></div>
    <script src="/static/login.js"></script>
  </body>
</html>
