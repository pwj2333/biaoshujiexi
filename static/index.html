<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航运部 Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-title">
          <h1>航运部 Agent</h1>
          <span id="fileStatus" class="pill neutral">待解析</span>
        </div>
        <nav class="main-tabs" aria-label="主业务板块">
          <button class="main-tab active" data-workspace="bidWorkspace">标书解析</button>
          <button class="main-tab" data-workspace="marketWorkspace">市场情报</button>
        </nav>
        <div class="header-actions">
          <span id="configStatus" class="pill neutral">未保存</span>
          <span id="feishuStatus" class="pill neutral">未启用</span>
          <button id="settingsToggleBtn">系统设置</button>
          <button id="logoutBtn" class="ghost compact-logout">退出登录</button>
        </div>
      </header>

      <aside id="settingsPanel" class="settings-panel hidden" aria-label="系统设置">
        <div class="settings-head">
          <h2>系统设置</h2>
          <button id="settingsCloseBtn" class="ghost">关闭</button>
        </div>
        <details class="config-card" open>
          <summary>
            <span>AI 配置</span>
          </summary>
          <div class="config-body">
            <label class="field">
              <span>接口模板</span>
              <select id="configPreset">
                <option value="custom">自定义</option>
                <option value="openai">OpenAI</option>
                <option value="openrouter">OpenRouter</option>
              </select>
            </label>
            <label class="field">
              <span>Base URL</span>
              <input id="baseUrl" placeholder="https://api.openai.com/v1" />
            </label>
            <label class="field">
              <span>模型名称</span>
              <input id="modelName" placeholder="gpt-4.1-mini" />
            </label>
            <label class="field">
              <span>API Key</span>
              <input id="apiKey" type="password" placeholder="sk-..." />
            </label>
            <label class="field">
              <span>Temperature</span>
              <input id="temperature" type="number" step="0.1" min="0" max="1" value="0.1" />
            </label>
            <div class="button-row">
              <button id="saveConfigBtn" class="primary">保存配置</button>
              <button id="testConfigBtn">测试连通</button>
            </div>
          </div>
        </details>

        <details class="config-card">
          <summary>
            <span>飞书 Agent</span>
          </summary>
          <div class="config-body">
            <label class="check-line">
              <input id="feishuEnabled" type="checkbox" />
              <span>启用飞书事件回调</span>
            </label>
            <label class="field">
              <span>接收模式</span>
              <select id="feishuReceiveMode">
                <option value="ws">长连接</option>
                <option value="http">HTTP 回调</option>
              </select>
            </label>
            <label class="field">
              <span>HTTP 回调地址</span>
              <input id="feishuCallbackUrl" readonly />
            </label>
            <label class="field">
              <span>App ID</span>
              <input id="feishuAppId" placeholder="cli_..." />
            </label>
            <label class="field">
              <span>App Secret</span>
              <input id="feishuAppSecret" type="password" placeholder="留空则保留原值" />
            </label>
            <label class="field">
              <span>Verification Token</span>
              <input id="feishuVerificationToken" type="password" placeholder="留空则保留原值" />
            </label>
            <label class="field">
              <span>Encrypt Key</span>
              <input id="feishuEncryptKey" type="password" />
            </label>
            <label class="field">
              <span>允许 open_id</span>
              <textarea id="feishuAllowedOpenIds" rows="2"></textarea>
            </label>
            <label class="field">
              <span>允许 chat_id</span>
              <textarea id="feishuAllowedChatIds" rows="2"></textarea>
            </label>
            <div class="two-col">
              <label class="field">
                <span>测试类型</span>
                <select id="feishuTestReceiveType">
                  <option value="open_id">open_id</option>
                  <option value="chat_id">chat_id</option>
                </select>
              </label>
              <label class="field">
                <span>测试接收 ID</span>
                <input id="feishuTestReceiveId" placeholder="open_id / chat_id" />
              </label>
            </div>
            <div class="button-row">
              <button id="saveFeishuBtn" class="primary">保存飞书配置</button>
              <button id="testFeishuBtn">发送测试消息</button>
            </div>
          </div>
        </details>

        <section id="userPanel" class="settings-section">
          <div class="tracking-head">
            <h3>账号管理</h3>
            <button id="userNavBtn" class="hidden" data-target="userPanel">账号管理</button>
          </div>
          <div class="settings-account-grid">
            <section class="tracking-card">
              <div class="tracking-head">
                <h4>新建账号</h4>
              </div>
              <div class="form-grid">
                <label class="field">
                  <span>用户名</span>
                  <input id="newUsername" />
                </label>
                <label class="field">
                  <span>显示名称</span>
                  <input id="newDisplayName" />
                </label>
                <label class="field">
                  <span>密码</span>
                  <input id="newPassword" type="password" />
                </label>
                <label class="field">
                  <span>角色</span>
                  <select id="newUserRole">
                    <option value="user">普通用户</option>
                    <option value="admin">管理员</option>
                  </select>
                </label>
              </div>
              <div class="button-row">
                <button id="createUserBtn" class="primary">创建账号</button>
              </div>
            </section>
            <section class="tracking-card">
              <div class="tracking-head">
                <h4>账号列表</h4>
                <button id="refreshUsersBtn">刷新</button>
              </div>
              <div id="userList" class="table-wrap compact-table"></div>
            </section>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <section id="bidWorkspace" class="business-workspace active">
          <div class="workbar">
            <label class="field">
              <span>项目标题</span>
              <input id="projectTitle" placeholder="默认取标书项目名称" />
            </label>
            <label class="field">
              <span>标书文件</span>
              <input
                id="fileInput"
                type="file"
                accept=".pdf,.doc,.docx,.xls,.xlsx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
              />
            </label>
            <label class="field">
              <span>登记方式</span>
              <select id="registerMode">
                <option value="packages">每个标段一行</option>
                <option value="document">整份标书一行</option>
              </select>
            </label>
            <label class="field">
              <span>登记年份</span>
              <input id="sheetName" placeholder="2026" />
            </label>
            <div class="workbar-actions">
              <button id="parseBtn" class="primary">开始解析</button>
              <button id="saveProjectBtn">保存记录</button>
              <button id="deleteProjectBtn" class="ghost danger">删除</button>
            </div>
          </div>

          <nav class="sub-tabs" aria-label="标书解析功能">
            <button class="nav-link active" data-target="overviewPanel">总览</button>
            <button class="nav-link" data-target="extractionPanel">摘取</button>
            <button class="nav-link" data-target="registerPanel">登记</button>
            <button class="nav-link" data-target="trackingPanel">跟踪</button>
            <button class="nav-link" data-target="chatPanel">对话</button>
            <button class="nav-link" data-target="historyPanel">历史</button>
          </nav>

          <section id="overviewPanel" class="content-panel">
            <div class="panel-head">
              <h3>总览</h3>
              <div class="button-row">
                <button id="askDefaultBtn">刷新分析</button>
                <button id="exportOverviewBtn" class="primary">导出总览</button>
              </div>
            </div>
            <div id="resultEmpty" class="empty-state">
              <strong>暂无解析结果</strong>
            </div>
            <div id="resultSection" class="result-section hidden">
              <div id="summaryPanel" class="summary-grid"></div>
              <div id="analysisPanel" class="analysis-grid"></div>
              <div id="reviewPanel" class="review-list"></div>
            </div>
          </section>

          <section id="extractionPanel" class="content-panel hidden">
            <div class="panel-head">
              <h3>摘取</h3>
              <button id="exportExtractionBtn" class="primary">导出摘取</button>
            </div>
            <div id="extractionTable" class="table-wrap"></div>
          </section>

          <section id="registerPanel" class="content-panel hidden">
            <div class="panel-head">
              <h3>登记</h3>
              <button id="exportRegisterBtn" class="primary">导出登记</button>
            </div>
            <div id="registerTable" class="table-wrap"></div>
          </section>

          <section id="trackingPanel" class="content-panel hidden">
            <div class="panel-head">
              <h3>跟踪</h3>
              <span class="pill neutral">项目档案</span>
            </div>
            <div class="tracking-grid">
              <section class="tracking-card">
                <div class="tracking-head">
                  <h4>跟踪结果</h4>
                </div>
                <div id="followUpForm" class="form-grid"></div>
              </section>
              <section class="tracking-card">
                <div class="tracking-head">
                  <h4>我司报价</h4>
                  <div class="button-row compact-actions">
                    <button id="exportOurQuotesBtn">导出</button>
                    <button id="addOurQuoteBtn">新增</button>
                  </div>
                </div>
                <div id="ourQuotesTable" class="table-wrap compact-table"></div>
              </section>
              <section class="tracking-card">
                <div class="tracking-head">
                  <h4>竞对报价</h4>
                  <div class="button-row compact-actions">
                    <button id="exportCompetitorQuotesBtn">导出</button>
                    <button id="addCompetitorQuoteBtn">新增</button>
                  </div>
                </div>
                <div id="competitorQuotesTable" class="table-wrap compact-table"></div>
              </section>
              <section class="tracking-card">
                <div class="tracking-head">
                  <h4>时间线</h4>
                  <button id="addTimelineBtn">新增</button>
                </div>
                <div id="timelineTable" class="table-wrap compact-table"></div>
              </section>
            </div>
          </section>

          <section id="chatPanel" class="content-panel hidden">
            <div class="panel-head">
              <h3>对话</h3>
              <span class="pill neutral">当前项目</span>
            </div>
            <div id="chatMessages" class="chat-box"></div>
            <div class="chat-compose">
              <textarea id="chatInput" rows="3" placeholder="输入问题"></textarea>
              <button id="sendChatBtn" class="primary">发送</button>
            </div>
          </section>

          <section id="historyPanel" class="content-panel hidden">
            <div class="panel-head">
              <h3>历史</h3>
              <div class="button-row">
                <span id="projectCount" class="pill neutral">0 条</span>
                <button id="exportLedgerBtn" class="primary">导出台账</button>
              </div>
            </div>
            <div class="history-layout">
              <div class="history-query-card">
                <label class="field">
                  <span>关键词</span>
                  <input id="projectSearch" placeholder="项目名称、招标编号、招标人、文件名" />
                </label>
                <div class="history-filters">
                  <label class="field">
                    <span>登记年份</span>
                    <input id="historyYear" placeholder="2026" />
                  </label>
                  <label class="field">
                    <span>投标状态</span>
                    <select id="historyBidStatus">
                      <option value="">全部</option>
                      <option value="待跟进">待跟进</option>
                      <option value="准备投标">准备投标</option>
                      <option value="已投标">已投标</option>
                      <option value="放弃">放弃</option>
                      <option value="未投标">未投标</option>
                    </select>
                  </label>
                  <label class="field">
                    <span>中标状态</span>
                    <select id="historyAwardStatus">
                      <option value="">全部</option>
                      <option value="未知">未知</option>
                      <option value="待定">待定</option>
                      <option value="已中标">已中标</option>
                      <option value="未中标">未中标</option>
                    </select>
                  </label>
                </div>
              </div>
              <div id="historyStats" class="history-stats"></div>
              <div id="projectList" class="project-list ledger-list"></div>
            </div>
          </section>
        </section>

        <section id="marketWorkspace" class="business-workspace">
          <section id="marketSkillPanel" class="content-panel">
            <div class="panel-head">
              <h3>市场情报</h3>
              <button id="marketExportBtn" class="primary">导出台账</button>
            </div>
            <div class="market-tabs">
              <button id="marketCargoTab" class="market-tab active" data-kind="cargo">商机收集</button>
              <button id="marketNewbuildingTab" class="market-tab" data-kind="newbuilding">新造船收集</button>
            </div>
            <details class="tracking-card market-analysis-card">
              <summary class="tracking-head market-analysis-summary">
                <h4 id="marketAnalysisTitle">商机市场分析</h4>
                <div class="button-row compact-actions">
                  <button id="marketGenerateReportBtn" class="primary">生成报告</button>
                  <button id="marketReportExportBtn">导出 Word</button>
                </div>
              </summary>
              <div class="form-grid market-report-filters">
                <label class="field">
                  <span>开始日期</span>
                  <input id="marketReportStart" type="date" />
                </label>
                <label class="field">
                  <span>结束日期</span>
                  <input id="marketReportEnd" type="date" />
                </label>
                <label class="field field-span-2">
                  <span>分析提示词</span>
                  <textarea id="marketReportPrompt" rows="4"></textarea>
                </label>
              </div>
              <div id="marketAnalysis" class="market-analysis"></div>
            </details>
            <div class="market-grid">
              <div class="market-left">
                <details class="tracking-card market-filter-card">
                  <summary class="tracking-head market-filter-summary">
                    <h4>查询与统计</h4>
                    <span id="marketCount" class="pill neutral">0 条</span>
                  </summary>
                  <div class="form-grid">
                    <label class="field">
                      <span>关键字</span>
                      <input id="marketSearch" placeholder="航线、货品、货主、船厂、船东" />
                    </label>
                    <label class="field market-cargo-filter">
                      <span>货盘类型</span>
                      <select id="marketBoardType">
                        <option value="">全部</option>
                        <option value="长期货盘">长期货盘</option>
                        <option value="即时货盘">即时货盘</option>
                      </select>
                    </label>
                    <label class="field market-cargo-filter">
                      <span>业务板块</span>
                      <select id="marketSegment">
                        <option value="">全部</option>
                        <option value="内贸化">内贸化</option>
                        <option value="内贸油">内贸油</option>
                        <option value="外贸">外贸</option>
                      </select>
                    </label>
                    <label class="field market-cargo-filter">
                      <span>成交状态</span>
                      <select id="marketStatus">
                        <option value="">全部</option>
                        <option value="跟进中">跟进中</option>
                        <option value="已成交">已成交</option>
                        <option value="未成交">未成交</option>
                        <option value="放弃">放弃</option>
                      </select>
                    </label>
                  </div>
                  <div id="marketStats" class="history-stats"></div>
                </details>
                <section class="tracking-card market-ledger-card">
                  <div class="tracking-head">
                    <h4 id="marketLedgerTitle">商机台账</h4>
                  </div>
                  <div id="marketList" class="project-list ledger-list"></div>
                </section>
              </div>
              <section class="tracking-card market-editor-card">
                <div class="tracking-head">
                  <h4 id="marketFormTitle">商机录入</h4>
                  <span id="marketSaveStatus" class="pill neutral">新记录</span>
                </div>
                <label class="field">
                  <span>粘贴文本 / 邮件正文 / 资讯内容</span>
                  <textarea id="marketRawText" rows="5"></textarea>
                </label>
                <div class="market-editor-scroll">
                  <div id="marketForm" class="form-grid market-form"></div>
                  <div id="marketSourceSummary" class="market-source-summary hidden"></div>
                </div>
                <div class="button-row market-editor-actions">
                  <button id="marketExtractBtn">AI识别填表</button>
                  <button id="marketNewBtn">新建空白</button>
                  <button id="marketSaveBtn" class="primary">保存记录</button>
                  <button id="marketDeleteBtn" class="ghost danger">删除当前</button>
                </div>
              </section>
            </div>
          </section>
        </section>
      </main>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
